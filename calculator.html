<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --body-1:#232527;
    --body-2:#1a1c1e;
    --panel-edge:#2f3234;
    --screen-bg:#0e1c15;
    --screen-glow:#7cffb2;
    --screen-dim:#3d6b52;
    --key-num:#3a3d42;
    --key-num-text:#f0efe9;
    --key-op:#d98f3f;
    --key-op-text:#1a1206;
    --key-fn:#3fa4a0;
    --key-fn-text:#0a1f1d;
    --key-mem:#57595d;
    --key-mem-text:#eceae4;
    --key-danger:#a8503f;
    --key-danger-text:#f5eae6;
    --accent-cyan:#5fd8d0;
    --focus-ring:#9be8ff;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #2c2f31 0%, #17181a 65%);
    font-family:'Space Grotesk', sans-serif;
    color:var(--key-num-text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .rig{
    width:100%;
    max-width:460px;
  }

  .brand-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:0 6px 14px;
  }

  .brand{
    font-size:13px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#8b8f92;
    font-weight:500;
  }

  .brand em{
    font-style:normal;
    color:var(--accent-cyan);
  }

  .model{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:#5c6063;
    letter-spacing:.05em;
  }

  .chassis{
    background:
      linear-gradient(155deg, var(--body-1), var(--body-2) 70%);
    border-radius:22px;
    padding:18px 18px 22px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,.65),
      0 1px 0 rgba(255,255,255,.04) inset,
      0 -1px 0 rgba(0,0,0,.5) inset;
    border:1px solid var(--panel-edge);
    position:relative;
  }

  /* --- screen --- */
  .screen-unit{
    background:linear-gradient(180deg,#0a0a0a,#141416);
    border-radius:14px;
    padding:12px 14px 10px;
    margin-bottom:16px;
    box-shadow:0 2px 0 rgba(255,255,255,.03) inset, 0 6px 18px rgba(0,0,0,.5) inset;
    border:1px solid #050505;
  }

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 2px 8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:.08em;
    color:var(--screen-dim);
  }

  .status-row .indicators{
    display:flex;
    gap:10px;
  }

  .indicators span{
    opacity:.35;
    transition:opacity .15s ease, color .15s ease, text-shadow .15s ease;
  }

  .indicators span.on{
    opacity:1;
    color:var(--screen-glow);
    text-shadow:0 0 8px rgba(124,255,178,.6);
  }

  .mode-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    user-select:none;
    background:none;
    border:none;
    padding:0;
    font:inherit;
    color:inherit;
  }

  .toggle-track{
    width:30px;
    height:14px;
    border-radius:8px;
    background:#0c1410;
    border:1px solid #23372c;
    position:relative;
    transition:background .2s ease;
  }

  .toggle-track::after{
    content:"";
    position:absolute;
    top:1px;
    left:1px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--screen-dim);
    transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
  }

  .mode-toggle.rad .toggle-track::after{
    transform:translateX(15px);
    background:var(--screen-glow);
    box-shadow:0 0 6px rgba(124,255,178,.7);
  }

  .display-screen{
    background:var(--screen-bg);
    border-radius:8px;
    padding:16px 14px 12px;
    min-height:104px;
    position:relative;
    overflow:hidden;
  }

  .display-screen::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,.12) 3px
    );
    pointer-events:none;
  }

  .history-tape{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--screen-dim);
    min-height:16px;
    white-space:nowrap;
    overflow-x:auto;
    scrollbar-width:none;
    letter-spacing:.02em;
  }
  .history-tape::-webkit-scrollbar{display:none;}

  .expression-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    color:#4a8a6c;
    min-height:18px;
    margin-top:2px;
    white-space:nowrap;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .expression-line::-webkit-scrollbar{display:none;}

  .result-line{
    font-family:'IBM Plex Mono', monospace;
    font-weight:500;
    font-size:clamp(28px, 8vw, 38px);
    color:var(--screen-glow);
    text-shadow:0 0 12px rgba(124,255,178,.45), 0 0 2px rgba(124,255,178,.8);
    text-align:right;
    margin-top:6px;
    white-space:nowrap;
    overflow-x:auto;
    letter-spacing:.01em;
    scrollbar-width:none;
  }
  .result-line::-webkit-scrollbar{display:none;}

  .error .result-line{
    color:#ff8f7a;
    text-shadow:0 0 12px rgba(255,110,85,.5);
    font-size:20px;
  }

  /* --- second function strip --- */
  .strip{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }

  .strip button{
    flex:1;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.03em;
    padding:9px 4px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.06);
    background:#2a2c2f;
    color:#a9adb0;
    cursor:pointer;
    transition:transform .05s ease, background .15s ease, color .15s ease, box-shadow .15s ease;
  }

  .strip button.active{
    background:#24413d;
    color:var(--accent-cyan);
    box-shadow:0 0 0 1px rgba(95,216,208,.4) inset;
  }

  .strip button:active{ transform:scale(.94); }

  /* --- keypad --- */
  .keypad{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
  }

  button.key{
    appearance:none;
    border:none;
    border-radius:11px;
    font-family:'Space Grotesk', sans-serif;
    font-size:15px;
    font-weight:500;
    padding:13px 0;
    cursor:pointer;
    position:relative;
    transition:transform .06s ease, filter .15s ease, box-shadow .1s ease;
    box-shadow:0 2px 0 rgba(0,0,0,.28), 0 1px 0 rgba(255,255,255,.08) inset;
  }

  button.key:active{
    transform:translateY(2px);
    box-shadow:0 0px 0 rgba(0,0,0,.28), 0 1px 0 rgba(255,255,255,.08) inset;
  }

  button.key:focus-visible{
    outline:2px solid var(--focus-ring);
    outline-offset:2px;
  }

  .key.num{ background:var(--key-num); color:var(--key-num-text); }
  .key.num:hover{ filter:brightness(1.12); }

  .key.op{ background:var(--key-op); color:var(--key-op-text); font-weight:600; }
  .key.op:hover{ filter:brightness(1.08); }

  .key.fn{ background:var(--key-fn); color:var(--key-fn-text); font-size:13px; }
  .key.fn:hover{ filter:brightness(1.1); }

  .key.mem{ background:var(--key-mem); color:var(--key-mem-text); font-size:12.5px; }
  .key.mem:hover{ filter:brightness(1.1); }

  .key.danger{ background:var(--key-danger); color:var(--key-danger-text); font-size:13px; }
  .key.danger:hover{ filter:brightness(1.1); }

  .key.equals{
    background:linear-gradient(160deg, var(--accent-cyan), #2f9089);
    color:#06211e;
    font-size:20px;
    font-weight:700;
  }

  .span2{ grid-column:span 2; }

  footer.tag{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:.15em;
    color:#54585b;
    margin-top:14px;
    text-transform:uppercase;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (max-width:400px){
    button.key{ font-size:13.5px; padding:11px 0; }
    .key.fn{ font-size:11.5px; }
  }
</style>
</head>
<body>

<div class="rig">

  <div class="brand-row">
    <div class="brand">Calc<em>•</em>Instrument</div>
    <div class="model">MODEL SC-7</div>
  </div>

  <div class="chassis">

    <div class="screen-unit">
      <div class="status-row">
        <div class="indicators">
          <span id="ind-2nd">2ND</span>
          <span id="ind-m">M</span>
        </div>
        <button class="mode-toggle rad" id="modeToggle" aria-label="Toggle degrees or radians">
          <span id="modeLabel">RAD</span>
          <span class="toggle-track"></span>
        </button>
      </div>

      <div class="display-screen" id="screenWrap">
        <div class="history-tape" id="historyTape">&nbsp;</div>
        <div class="expression-line" id="exprLine">&nbsp;</div>
        <div class="result-line" id="resultLine">0</div>
      </div>
    </div>

    <div class="strip">
      <button id="toggle2nd" data-strip="2nd">2nd</button>
      <button data-fn="deg-rad" id="degRadBtn">RAD</button>
      <button data-action="mplus">M+</button>
      <button data-action="mminus">M−</button>
      <button data-action="mr">MR</button>
      <button data-action="mc">MC</button>
    </div>

    <div class="keypad" id="keypad">
      <!-- Row 1: memory/clear/back -->
      <button class="key danger" data-action="clear">AC</button>
      <button class="key danger" data-action="backspace">⌫</button>
      <button class="key op" data-insert="(">(</button>
      <button class="key op" data-insert=")">)</button>
      <button class="key op" data-insert="%">%</button>

      <!-- Row 2: scientific -->
      <button class="key fn" data-primary="sin(" data-alt="asin(">sin</button>
      <button class="key fn" data-primary="cos(" data-alt="acos(">cos</button>
      <button class="key fn" data-primary="tan(" data-alt="atan(">tan</button>
      <button class="key fn" data-primary="log(" data-alt="10^(">log</button>
      <button class="key fn" data-primary="ln(" data-alt="e^(">ln</button>

      <!-- Row 3: scientific -->
      <button class="key fn" data-primary="sqrt(" data-alt="cbrt(">√x</button>
      <button class="key fn" data-insert="^">xʸ</button>
      <button class="key fn" data-insert="!">x!</button>
      <button class="key fn" data-insert="pi">π</button>
      <button class="key fn" data-insert="e">e</button>

      <!-- Row 4: numbers -->
      <button class="key num" data-insert="7">7</button>
      <button class="key num" data-insert="8">8</button>
      <button class="key num" data-insert="9">9</button>
      <button class="key op" data-insert="/">÷</button>
      <button class="key fn" data-primary="1/(" data-alt="abs(">1/x</button>

      <!-- Row 5: numbers -->
      <button class="key num" data-insert="4">4</button>
      <button class="key num" data-insert="5">5</button>
      <button class="key num" data-insert="6">6</button>
      <button class="key op" data-insert="*">×</button>
      <button class="key fn" data-insert="EXP">EXP</button>

      <!-- Row 6: numbers -->
      <button class="key num" data-insert="1">1</button>
      <button class="key num" data-insert="2">2</button>
      <button class="key num" data-insert="3">3</button>
      <button class="key op" data-insert="-">−</button>
      <button class="key mem" data-action="ans">Ans</button>

      <!-- Row 7 -->
      <button class="key num span2" data-insert="0">0</button>
      <button class="key num" data-insert=".">.</button>
      <button class="key op" data-insert="+">+</button>
      <button class="key equals" data-action="equals">=</button>
    </div>

  </div>

  <footer class="tag">All functions live · deg / rad aware · full keyboard support</footer>
</div>

<script>
(function(){
  const exprLine = document.getElementById('exprLine');
  const resultLine = document.getElementById('resultLine');
  const historyTape = document.getElementById('historyTape');
  const screenWrap = document.getElementById('screenWrap');
  const modeToggle = document.getElementById('modeToggle');
  const modeLabel = document.getElementById('modeLabel');
  const degRadBtn = document.getElementById('degRadBtn');
  const ind2nd = document.getElementById('ind-2nd');
  const indM = document.getElementById('ind-m');
  const toggle2ndBtn = document.getElementById('toggle2nd');
  const keypad = document.getElementById('keypad');

  let expr = '';
  let isDeg = false;
  let second = false;
  let memory = 0;
  let lastAnswer = 0;
  let justEvaluated = false;

  function setMode(deg){
    isDeg = deg;
    modeLabel.textContent = isDeg ? 'DEG' : 'RAD';
    degRadBtn.textContent = isDeg ? 'DEG' : 'RAD';
    modeToggle.classList.toggle('rad', !isDeg);
  }
  setMode(false);

  function refreshLabels(){
    document.querySelectorAll('[data-primary]').forEach(btn=>{
      const primary = btn.getAttribute('data-primary');
      const alt = btn.getAttribute('data-alt');
      if(second && alt){
        btn.textContent = alt.replace('(','').toUpperCase();
        btn.dataset.active = alt;
      } else {
        btn.textContent = primary.replace('(','');
        btn.dataset.active = primary;
      }
    });
    ind2nd.classList.toggle('on', second);
    toggle2ndBtn.classList.toggle('active', second);
  }
  refreshLabels();

  toggle2ndBtn.addEventListener('click', ()=>{
    second = !second;
    refreshLabels();
  });

  modeToggle.addEventListener('click', ()=> setMode(!isDeg));
  degRadBtn.addEventListener('click', ()=> setMode(!isDeg));

  function updateDisplay(showResult){
    exprLine.textContent = expr.length ? formatExprForDisplay(expr) : '\u00A0';
    if(showResult !== undefined){
      resultLine.textContent = showResult;
    }
  }

  function formatExprForDisplay(str){
    return str
      .replace(/\*/g,'×')
      .replace(/\//g,'÷')
      .replace(/sqrt\(/g,'√(')
      .replace(/pi/g,'π');
  }

  // ---------- Tokenizer + Parser (safe, no eval) ----------
  const FUNCS = ['sin','cos','tan','asin','acos','atan','sqrt','cbrt','log','ln','abs','exp'];

  function tokenize(input){
    const tokens = [];
    let i = 0;
    const s = input.replace(/\s+/g,'');
    while(i < s.length){
      const c = s[i];
      if(/[0-9.]/.test(c)){
        let num = c; i++;
        while(i < s.length && /[0-9.]/.test(s[i])){ num += s[i]; i++; }
        tokens.push({type:'num', value:parseFloat(num)});
        continue;
      }
      if(/[a-zA-Z]/.test(c)){
        let word = c; i++;
        while(i < s.length && /[a-zA-Z]/.test(s[i])){ word += s[i]; i++; }
        if(word === 'pi'){ tokens.push({type:'num', value:Math.PI}); }
        else if(word === 'e'){ tokens.push({type:'num', value:Math.E}); }
        else if(word === 'EXP'){ tokens.push({type:'op', value:'E'}); }
        else if(word === 'Ans'){ tokens.push({type:'num', value:lastAnswer}); }
        else if(FUNCS.includes(word)){ tokens.push({type:'func', value:word}); }
        else { throw new Error('Unknown token: ' + word); }
        continue;
      }
      if('+-*/^!()%,'.includes(c)){
        tokens.push({type:'op', value:c});
        i++;
        continue;
      }
      throw new Error('Unexpected character: ' + c);
    }
    return tokens;
  }

  function parse(tokens){
    let pos = 0;
    function peek(){ return tokens[pos]; }
    function next(){ return tokens[pos++]; }

    function parseExpression(){
      let left = parseTerm();
      while(peek() && peek().type==='op' && (peek().value==='+' || peek().value==='-')){
        const opTok = next();
        const right = parseTerm();
        left = opTok.value==='+' ? left+right : left-right;
      }
      return left;
    }

    function parseTerm(){
      let left = parseFactor();
      while(peek() && peek().type==='op' && (peek().value==='*' || peek().value==='/')){
        const opTok = next();
        const right = parseFactor();
        if(opTok.value==='/'){
          if(right===0) throw new Error('Division by zero');
          left = left/right;
        } else {
          left = left*right;
        }
      }
      return left;
    }

    function parseFactor(){
      let base = parseUnary();
      if(peek() && peek().type==='op' && peek().value==='^'){
        next();
        const exponent = parseFactor(); // right-assoc
        base = Math.pow(base, exponent);
      }
      return base;
    }

    function parseUnary(){
      if(peek() && peek().type==='op' && peek().value==='-'){
        next();
        return -parseUnary();
      }
      if(peek() && peek().type==='op' && peek().value==='+'){
        next();
        return parseUnary();
      }
      return parsePostfix();
    }

    function parsePostfix(){
      let value = parsePrimary();
      while(peek() && peek().type==='op' && (peek().value==='!' || peek().value==='%' || peek().value==='E')){
        const opTok = next();
        if(opTok.value==='!'){
          value = factorial(value);
        } else if(opTok.value==='%'){
          value = value/100;
        } else if(opTok.value==='E'){
          // EXP acts as *10^n — expects a following number/expression already parsed? Simplify: EXP means *10^(next primary)
          const rightExp = parsePrimary();
          value = value * Math.pow(10, rightExp);
        }
      }
      return value;
    }

    function parsePrimary(){
      const tok = peek();
      if(!tok) throw new Error('Unexpected end of expression');

      if(tok.type==='num'){ next(); return tok.value; }

      if(tok.type==='func'){
        next();
        if(!peek() || peek().value !== '(') throw new Error('Expected ( after function');
        next(); // consume (
        const arg = parseExpression();
        if(!peek() || peek().value !== ')') throw new Error('Expected )');
        next(); // consume )
        return applyFunc(tok.value, arg);
      }

      if(tok.type==='op' && tok.value==='('){
        next();
        const val = parseExpression();
        if(!peek() || peek().value !== ')') throw new Error('Mismatched parentheses');
        next();
        return val;
      }

      throw new Error('Unexpected token');
    }

    const result = parseExpression();
    if(pos !== tokens.length) throw new Error('Unexpected trailing input');
    return result;
  }

  function factorial(n){
    if(n < 0 || !Number.isFinite(n)) throw new Error('Invalid factorial');
    if(Math.abs(n - Math.round(n)) > 1e-9){
      // gamma approximation for non-integers (Stirling)
      return gamma(n+1);
    }
    n = Math.round(n);
    if(n > 170) throw new Error('Overflow');
    let r = 1;
    for(let k=2;k<=n;k++) r*=k;
    return r;
  }

  function gamma(x){
    const g = 7;
    const p = [0.99999999999980993,676.5203681218851,-1259.1392167224028,
      771.32342877765313,-176.61502916214059,12.507343278686905,
      -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
    if(x < 0.5){
      return Math.PI / (Math.sin(Math.PI*x) * gamma(1-x));
    }
    x -= 1;
    let a = p[0];
    const t = x + g + 0.5;
    for(let i=1;i<g+2;i++) a += p[i]/(x+i);
    return Math.sqrt(2*Math.PI) * Math.pow(t, x+0.5) * Math.exp(-t) * a;
  }

  function applyFunc(name, arg){
    const toRad = (v)=> isDeg ? v*Math.PI/180 : v;
    const fromRad = (v)=> isDeg ? v*180/Math.PI : v;
    switch(name){
      case 'sin': return Math.sin(toRad(arg));
      case 'cos': return Math.cos(toRad(arg));
      case 'tan': return Math.tan(toRad(arg));
      case 'asin': return fromRad(Math.asin(arg));
      case 'acos': return fromRad(Math.acos(arg));
      case 'atan': return fromRad(Math.atan(arg));
      case 'sqrt':
        if(arg < 0) throw new Error('Negative root');
        return Math.sqrt(arg);
      case 'cbrt': return Math.cbrt(arg);
      case 'log':
        if(arg <= 0) throw new Error('Log domain error');
        return Math.log10(arg);
      case 'ln':
        if(arg <= 0) throw new Error('Ln domain error');
        return Math.log(arg);
      case 'abs': return Math.abs(arg);
      case 'exp': return Math.exp(arg);
      default: throw new Error('Unknown function ' + name);
    }
  }

  function formatResult(n){
    if(!Number.isFinite(n)) return 'Error';
    if(Math.abs(n) < 1e-12) n = 0;
    if(Math.abs(n) > 1e15 || (Math.abs(n) < 1e-9 && n !== 0)){
      return n.toExponential(6).replace('e+','e');
    }
    let s = parseFloat(n.toFixed(10)).toString();
    return s;
  }

  function autoCloseParens(str){
    // Count unmatched open parentheses and append the needed
    // closing parens so users don't have to type them manually.
    let openCount = 0;
    for(const ch of str){
      if(ch === '(') openCount++;
      else if(ch === ')') openCount = Math.max(0, openCount - 1);
    }
    return str + ')'.repeat(openCount);
  }

  function evaluate(){
    if(expr.trim()===''){ return; }
    try{
      const exprToEval = autoCloseParens(expr);
      const tokens = tokenize(exprToEval);
      const value = parse(tokens);
      const formatted = formatResult(value);
      historyTape.textContent = formatExprForDisplay(exprToEval) + ' =';
      lastAnswer = value;
      resultLine.textContent = formatted;
      screenWrap.classList.remove('error');
      expr = formatted;
      exprLine.textContent = '\u00A0';
      justEvaluated = true;
    } catch(err){
      screenWrap.classList.add('error');
      resultLine.textContent = err.message || 'Error';
    }
  }

  function insert(token){
    if(justEvaluated){
      // if user starts typing a number fresh after =, clear; if operator, continue from result
      if(/^[0-9.]$/.test(token) || FUNCS.some(f=>token.startsWith(f)) || token==='('){
        expr = '';
      }
      justEvaluated = false;
    }
    screenWrap.classList.remove('error');
    expr += token;
    updateDisplay();
  }

  keypad.addEventListener('click', (e)=>{
    const btn = e.target.closest('button');
    if(!btn) return;

    if(btn.dataset.insert !== undefined){
      insert(btn.dataset.insert);
      return;
    }
    if(btn.dataset.primary !== undefined){
      const val = second && btn.dataset.alt ? btn.dataset.alt : btn.dataset.primary;
      insert(val);
      return;
    }
    if(btn.dataset.action !== undefined){
      handleAction(btn.dataset.action);
    }
  });

  function handleAction(action){
    switch(action){
      case 'clear':
        expr = '';
        resultLine.textContent = '0';
        historyTape.textContent = '\u00A0';
        screenWrap.classList.remove('error');
        justEvaluated = false;
        updateDisplay();
        break;
      case 'backspace':
        if(justEvaluated){ expr=''; justEvaluated=false; }
        else expr = expr.slice(0,-1);
        screenWrap.classList.remove('error');
        updateDisplay();
        break;
      case 'equals':
        evaluate();
        break;
      case 'ans':
        insert('Ans');
        break;
      case 'mplus':
        try{ memory += parseFloat(resultLine.textContent) || 0; indM.classList.add('on'); }catch(e){}
        break;
      case 'mminus':
        try{ memory -= parseFloat(resultLine.textContent) || 0; indM.classList.toggle('on', memory!==0); }catch(e){}
        break;
      case 'mr':
        insert(formatResult(memory));
        break;
      case 'mc':
        memory = 0;
        indM.classList.remove('on');
        break;
    }
  }

  // ---------- Keyboard support ----------
  window.addEventListener('keydown', (e)=>{
    const key = e.key;
    if(/[0-9.+\-*/^%()]/.test(key)){
      e.preventDefault();
      insert(key);
    } else if(key === 'Enter' || key === '='){
      e.preventDefault();
      evaluate();
    } else if(key === 'Backspace'){
      e.preventDefault();
      handleAction('backspace');
    } else if(key === 'Escape'){
      e.preventDefault();
      handleAction('clear');
    } else if(key === '!'){
      e.preventDefault();
      insert('!');
    }
  });

  updateDisplay();
})();
</script>

</body>
</html>
